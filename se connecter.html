    <script>
     

        let header = document.getElementById('header');
    let timer;

    window.addEventListener('scroll', () => {
        if (window.scrollY > 0) {
            clearTimeout(timer);
            timer = setTimeout(() => {
                header.classList.add('header-color');
            },100);
        } else {
            clearTimeout(timer);
            header.classList.remove('header-color');
        }
    });
      </script>
